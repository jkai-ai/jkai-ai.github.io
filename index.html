<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일에서도 잘 보이도록 viewport 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 명언 & 자동 수집 콘텐츠</title>

  <!-- 구글 폰트: 한국어 웹폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- 스타일시트 연결 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========================================
       헤더 / 히어로 섹션 - 명언이 표시되는 영역
       ======================================== -->
  <header class="hero">
    <div class="hero-inner">
      <!-- 사이트 이름 -->
      <p class="site-title">Daily Quotes &amp; Contents</p>

      <!-- 영어 명언 (JavaScript가 내용을 채워 넣습니다) -->
      <blockquote>
        <p id="quote-en" class="quote-en">명언을 불러오는 중...</p>
        <p id="quote-ko" class="quote-ko"></p>
        <footer id="quote-author" class="quote-author"></footer>
      </blockquote>
    </div>
  </header>

  <!-- ========================================
       메인 콘텐츠 영역
       ======================================== -->
  <main class="main-content">

    <!-- 업데이트 날짜 표시 -->
    <p id="last-updated" style="font-size:0.82rem; color:#999; text-align:right; margin-bottom:1.5rem;"></p>

    <!-- 자동 수집 콘텐츠가 여기에 삽입됩니다 (script.js가 처리) -->
    <div id="content-area"></div>

  </main>

  <!-- ========================================
       푸터
       ======================================== -->
  <footer class="footer">
    <p>
      콘텐츠는 매일 자동으로 업데이트됩니다 &nbsp;|&nbsp;
      <a href="https://github.com/jk0601/claudeclonetest" target="_blank" rel="noopener">
        GitHub 저장소 보기
      </a>
    </p>
    <p style="margin-top:0.4rem; font-size:0.78rem; opacity:0.7;">
      GitHub Pages + GitHub Actions 자동화 예제 프로젝트
    </p>
  </footer>

  <!-- 자바스크립트 연결 (body 맨 아래에 두어야 HTML이 먼저 로드됩니다) -->
  <script src="script.js"></script>
</body>
</html>
