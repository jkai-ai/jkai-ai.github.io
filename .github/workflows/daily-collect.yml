# .github/workflows/daily-collect.yml
# ============================================================
# 역할: 매일 한국시간 오전 6시에 collector.py 를 실행해서
#       data/*.json 파일을 자동으로 업데이트하고 커밋합니다.
#
# UTC 21:00 = 한국시간(KST) 06:00 (KST = UTC + 9)
# ============================================================

name: Daily Data Collection

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 UTC 21:00 = KST 06:00
  workflow_dispatch:         # GitHub Actions 탭에서 수동 실행 가능

permissions:
  contents: write            # data/*.json 을 push하려면 write 권한 필요

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드를 서버로 가져오기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Python 환경 설정
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 필요한 라이브러리 설치 + 수집 스크립트 실행
      - name: 라이브러리 설치 및 데이터 수집
        run: |
          pip install -r requirements.txt
          python scripts/collector.py

      # 4. 변경된 JSON 파일을 저장소에 자동 커밋
      - name: 변경 사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "chore: daily data update $(date +'%Y-%m-%d')"
          git push
